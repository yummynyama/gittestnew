{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Панель администратора{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <style>
        :root {
            --indigo-900: #1E1B4B;
            --indigo-800: #27235E;
            --violet-600: #7C3AED;
            --violet-100: #EDE9FE;
            --surface: #F5F4FB;
            --border: #E5E7EB;
            --text-main: #1E1B4B;
            --text-muted: #6B7280;
            --sidebar-w: 220px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--surface);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .admin-sidebar {
            width: var(--sidebar-w);
            background: var(--indigo-900);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            padding: 1.5rem 0;
        }

        .admin-brand {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            padding: 0 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 1rem;
        }

        .admin-sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 0.75rem;
        }

        .admin-sidebar nav a {
            display: block;
            padding: 0.6rem 0.75rem;
            border-radius: 8px;
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }

        .admin-sidebar nav a:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .admin-sidebar nav a.active {
            background: var(--violet-600);
            color: #fff;
        }

        .admin-sidebar nav a.nav-divider {
            margin-top: auto;
            color: rgba(255,255,255,0.35);
            font-size: 0.8rem;
        }

        /* ── Main content ── */
        .admin-content {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 2rem 2.5rem;
            min-width: 0;
        }

        /* ── Alerts ── */
        .alert {
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        /* ── Cards ── */
        .card {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 1px 3px rgba(30,27,75,0.05);
        }

        /* ── Tables ── */
        .admin-table {
            font-size: 0.875rem;
        }

        .admin-table thead th {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            padding: 0.75rem 1rem;
        }

        .admin-table tbody td {
            padding: 0.9rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--border);
        }

        .admin-table tbody tr:last-child td { border-bottom: none; }
        .admin-table tbody tr:hover { background: #FAFAFF; }

        /* ── Badges ── */
        .badge {
            font-weight: 600;
            font-size: 0.75rem;
            padding: 0.35em 0.7em;
            border-radius: 6px;
        }

        .status-new { background: #DBEAFE; color: #1D4ED8; }
        .status-in_progress { background: #FEF9C3; color: #A16207; }
        .status-completed { background: #DCFCE7; color: #15803D; }

        /* ── Form controls ── */
        .form-control, .form-select {
            border-radius: 8px;
            border-color: var(--border);
            font-size: 0.875rem;
            padding: 0.5rem 0.8rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--violet-600);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
        }

        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
        }

        /* ── Buttons ── */
        .btn-primary {
            background: var(--violet-600);
            border-color: var(--violet-600);
            font-weight: 600;
            border-radius: 8px;
        }

        .btn-primary:hover { background: #6D28D9; border-color: #6D28D9; }
        .btn-dark { background: var(--indigo-900); border-color: var(--indigo-900); font-weight: 600; border-radius: 8px; }
        .btn-dark:hover { background: var(--indigo-800); }
        .btn-outline-secondary { border-radius: 8px; font-weight: 500; }

        /* ── Pagination ── */
        .page-link { border-radius: 8px !important; margin: 0 2px; font-size: 0.875rem; color: var(--violet-600); }
        .page-item.active .page-link { background: var(--violet-600); border-color: var(--violet-600); }

        /* ── Admin filters ── */
        .admin-filters .form-control,
        .admin-filters .form-select { font-size: 0.875rem; }

        /* ── Admin login ── */
        .admin-login-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .admin-login-card {
            width: 100%;
            max-width: 400px;
            border-top: 3px solid var(--indigo-900);
        }

        @media (max-width: 768px) {
            .admin-sidebar { display: none; }
            .admin-content { margin-left: 0; padding: 1.25rem; }
        }
    </style>
</head>
<body class="admin-portal">

    <aside class="admin-sidebar">
        <div class="admin-brand">Админ-панель</div>
        <nav>
            <a href="{% url 'portal:admin_dashboard' %}" class="active">📋 Заявки</a>
            <a href="{% url 'portal:home' %}">🌐 На портал</a>
            <a href="{% url 'portal:admin_logout' %}" style="margin-top:auto; color:rgba(255,255,255,0.4);">Выйти</a>
        </nav>
    </aside>

    <div class="admin-content">
        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
